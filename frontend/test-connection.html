<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .test-box {
            background: #2d2d2d;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #3e3e3e;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #1177bb;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .info { color: #9cdcfe; }
    </style>
</head>
<body>
    <h1>🔧 后端连接测试工具</h1>
    
    <div class="test-box">
        <h2>测试 1: 基础连接</h2>
        <button onclick="test1()">运行测试</button>
        <div class="result" id="result1">等待测试...</div>
    </div>
    
    <div class="test-box">
        <h2>测试 2: 获取模型列表</h2>
        <button onclick="test2()">运行测试</button>
        <div class="result" id="result2">等待测试...</div>
    </div>
    
    <div class="test-box">
        <h2>测试 3: 完整流程模拟</h2>
        <button onclick="test3()">运行测试</button>
        <div class="result" id="result3">等待测试...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function log(elementId, message, type) {
            const el = document.getElementById(elementId);
            const className = type || 'info';
            const timestamp = new Date().toLocaleTimeString();
            el.innerHTML += '<span class="' + className + '">[' + timestamp + '] ' + message + '</span>\n';
        }

        function clearLog(elementId) {
            document.getElementById(elementId).innerHTML = '';
        }

        async function test1() {
            clearLog('result1');
            log('result1', '开始测试基础连接...', 'info');
            
            try {
                log('result1', '请求: ' + API_URL + '/test');
                
                const response = await fetch(API_URL + '/test');
                
                log('result1', '状态码: ' + response.status);
                log('result1', '状态文本: ' + response.statusText);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const data = await response.json();
                log('result1', '✅ 成功!', 'success');
                log('result1', '响应数据:\n' + JSON.stringify(data, null, 2));
                
            } catch (error) {
                log('result1', '❌ 失败: ' + error.message, 'error');
                
                if (error.message.includes('Failed to fetch')) {
                    log('result1', '\n可能的原因:', 'error');
                    log('result1', '1. 后端服务未启动', 'error');
                    log('result1', '2. 后端端口不是5000', 'error');
                    log('result1', '3. 防火墙阻止连接', 'error');
                }
            }
        }

        async function test2() {
            clearLog('result2');
            log('result2', '开始测试模型API...', 'info');
            
            try {
                log('result2', '请求: ' + API_URL + '/models');
                
                const response = await fetch(API_URL + '/models');
                
                log('result2', '状态码: ' + response.status);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const data = await response.json();
                
                log('result2', '✅ 成功!', 'success');
                log('result2', '找到 ' + (data.models ? data.models.length : 0) + ' 个模型');
                log('result2', '设备: ' + data.device);
                log('result2', 'CUDA可用: ' + data.cuda_available);
                log('result2', '\n完整响应:\n' + JSON.stringify(data, null, 2));
                
            } catch (error) {
                log('result2', '❌ 失败: ' + error.message, 'error');
            }
        }

        async function test3() {
            clearLog('result3');
            log('result3', '开始完整流程测试...', 'info');
            
            // 步骤1: 测试连接
            log('result3', '\n步骤 1/3: 测试连接');
            try {
                const testResp = await fetch(API_URL + '/test');
                if (testResp.ok) {
                    log('result3', '✅ 连接正常', 'success');
                } else {
                    throw new Error('连接失败');
                }
            } catch (error) {
                log('result3', '❌ 连接失败: ' + error.message, 'error');
                return;
            }
            
            // 步骤2: 获取模型
            log('result3', '\n步骤 2/3: 获取模型列表');
            let models = [];
            try {
                const modelsResp = await fetch(API_URL + '/models');
                const modelsData = await modelsResp.json();
                models = modelsData.models || [];
                log('result3', '✅ 找到 ' + models.length + ' 个模型', 'success');
                
                if (models.length > 0) {
                    log('result3', '可用模型:');
                    models.forEach(m => {
                        log('result3', '  - ' + m.icon + ' ' + m.name + ' (' + m.id + ')');
                    });
                }
            } catch (error) {
                log('result3', '❌ 获取模型失败: ' + error.message, 'error');
                return;
            }
            
            // 步骤3: 检查健康状态
            log('result3', '\n步骤 3/3: 检查系统状态');
            try {
                const healthResp = await fetch(API_URL + '/health');
                const healthData = await healthResp.json();
                log('result3', '✅ 系统状态正常', 'success');
                log('result3', '设备: ' + healthData.device);
                log('result3', '已加载模型: ' + healthData.loaded_models.length + ' 个');
            } catch (error) {
                log('result3', '⚠️ 健康检查失败: ' + error.message, 'error');
            }
            
            log('result3', '\n' + '='.repeat(50), 'success');
            log('result3', '✅ 所有测试完成!', 'success');
            log('result3', '='.repeat(50), 'success');
        }

        // 页面加载时自动运行测试1
        window.onload = function() {
            console.log('测试页面加载完成');
            setTimeout(test1, 500);
        };
    </script>
</body>
</html>
